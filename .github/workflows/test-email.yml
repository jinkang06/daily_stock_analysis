name: 测试邮件发送

on:
  workflow_dispatch:

jobs:
  test-email:
    runs-on: ubuntu-latest

    steps:
      - name: 测试 SMTP 邮件
        env:
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis股票分析助手' }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          import ssl
          from email.mime.text import MIMEText
          from email.header import Header
          from email.utils import formataddr

          sender = os.getenv("EMAIL_SENDER", "").strip()
          password = os.getenv("EMAIL_PASSWORD", "").strip()
          receivers_raw = os.getenv("EMAIL_RECEIVERS", "").strip()
          sender_name = os.getenv("EMAIL_SENDER_NAME", "daily_stock_analysis股票分析助手").strip()

          print("========== 邮件配置检查 ==========")
          print("EMAIL_SENDER:", sender if sender else "未配置")
          print("EMAIL_PASSWORD:", "已配置，长度=" + str(len(password)) if password else "未配置")
          print("EMAIL_RECEIVERS:", receivers_raw if receivers_raw else "未配置")
          print("EMAIL_SENDER_NAME:", sender_name)
          print("=================================")

          if not sender:
              raise SystemExit("❌ EMAIL_SENDER 未配置")
          if not password:
              raise SystemExit("❌ EMAIL_PASSWORD 未配置")
          if not receivers_raw:
              raise SystemExit("❌ EMAIL_RECEIVERS 未配置")

          domain = sender.split("@")[-1].lower()

          smtp_map = {
              "163.com": ("smtp.163.com", 465),
              "126.com": ("smtp.126.com", 465),
              "qq.com": ("smtp.qq.com", 465),
              "gmail.com": ("smtp.gmail.com", 465),
              "outlook.com": ("smtp-mail.outlook.com", 587),
              "hotmail.com": ("smtp-mail.outlook.com", 587),
          }

          host, port = smtp_map.get(domain, ("smtp." + domain, 465))
          print(f"自动识别 SMTP: {domain} -> {host}:{port}")

          receivers = [x.strip() for x in receivers_raw.replace(";", ",").split(",") if x.strip()]
          print("收件人数量:", len(receivers))

          body = """这是一封 GitHub Actions SMTP 测试邮件。

如果你收到这封邮件，说明 EMAIL_SENDER / EMAIL_PASSWORD / EMAIL_RECEIVERS 基本配置正确。
"""

          msg = MIMEText(body, "plain", "utf-8")
          msg["From"] = formataddr((str(Header(sender_name, "utf-8")), sender))
          msg["To"] = ", ".join(receivers)
          msg["Subject"] = Header("GitHub Actions 邮件测试", "utf-8")

          try:
              if port == 465:
                  context = ssl.create_default_context()
                  with smtplib.SMTP_SSL(host, port, context=context, timeout=20) as server:
                      print("SMTP_SSL 已连接")
                      server.login(sender, password)
                      print("SMTP 登录成功")
                      server.sendmail(sender, receivers, msg.as_string())
                      print("✅ 测试邮件发送成功")
              else:
                  with smtplib.SMTP(host, port, timeout=20) as server:
                      print("SMTP 已连接")
                      server.starttls(context=ssl.create_default_context())
                      print("STARTTLS 成功")
                      server.login(sender, password)
                      print("SMTP 登录成功")
                      server.sendmail(sender, receivers, msg.as_string())
                      print("✅ 测试邮件发送成功")
          except smtplib.SMTPAuthenticationError as e:
              print("❌ SMTP 认证失败")
              print("错误码:", e.smtp_code)
              print("错误信息:", e.smtp_error.decode(errors="ignore") if isinstance(e.smtp_error, bytes) else e.smtp_error)
              raise
          except Exception as e:
              print("❌ 邮件发送异常:", repr(e))
              raise
          PY
