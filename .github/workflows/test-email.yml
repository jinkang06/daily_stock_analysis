name: test-email

on:
  workflow_dispatch:

jobs:
  test-email:
    runs-on: ubuntu-latest

    steps:
      - name: Test SMTP email
        env:
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis' }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import smtplib
          import ssl
          from email.mime.text import MIMEText
          from email.header import Header
          from email.utils import formataddr

          sender = os.environ.get("EMAIL_SENDER", "").strip()
          password = os.environ.get("EMAIL_PASSWORD", "").strip()
          receivers_raw = os.environ.get("EMAIL_RECEIVERS", "").strip()
          sender_name = os.environ.get("EMAIL_SENDER_NAME", "daily_stock_analysis").strip()

          print("========== EMAIL CONFIG ==========")
          print("EMAIL_SENDER:", sender or "NOT SET")
          print("EMAIL_PASSWORD:", "SET, length=" + str(len(password)) if password else "NOT SET")
          print("EMAIL_RECEIVERS:", receivers_raw or "NOT SET")
          print("EMAIL_SENDER_NAME:", sender_name)
          print("==================================")

          if not sender:
              raise SystemExit("EMAIL_SENDER is not set")
          if not password:
              raise SystemExit("EMAIL_PASSWORD is not set")
          if not receivers_raw:
              raise SystemExit("EMAIL_RECEIVERS is not set")

          domain = sender.split("@")[-1].lower()

          if domain == "163.com":
              host, port = "smtp.163.com", 465
          elif domain == "126.com":
              host, port = "smtp.126.com", 465
          elif domain == "qq.com":
              host, port = "smtp.qq.com", 465
          elif domain == "gmail.com":
              host, port = "smtp.gmail.com", 465
          else:
              host, port = "smtp." + domain, 465

          print("SMTP server:", host, port)

          receivers = [x.strip() for x in receivers_raw.replace(";", ",").split(",") if x.strip()]
          print("Receivers:", receivers)

          msg = MIMEText("This is a GitHub Actions SMTP test email.", "plain", "utf-8")
          msg["From"] = formataddr((str(Header(sender_name, "utf-8")), sender))
          msg["To"] = ", ".join(receivers)
          msg["Subject"] = str(Header("GitHub Actions SMTP Test", "utf-8"))

          try:
              context = ssl.create_default_context()
              with smtplib.SMTP_SSL(host, port, context=context, timeout=20) as server:
                  print("SMTP connected")
                  server.login(sender, password)
                  print("SMTP login succeeded")
                  server.sendmail(sender, receivers, msg.as_string())
                  print("EMAIL_SEND_SUCCESS")
          except smtplib.SMTPAuthenticationError as e:
              print("SMTP_AUTH_FAILED")
              print("smtp_code:", e.smtp_code)
              print("smtp_error:", e.smtp_error)
              raise
          except Exception as e:
              print("EMAIL_SEND_FAILED")
              print(repr(e))
              raise
          PY
